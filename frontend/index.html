<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechHub UERN</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>TechHub <span>UERN</span></h1>
        </div>
        <p>Agregador de Oportunidades para Estudantes</p>
    </header>

    <main>
        <div class="controles">
            <button id="btn-estagios" class="ativo" onclick="carregarDados('estagios')">Ver Estágios (PRAE)</button>
            <button id="btn-bolsas" onclick="carregarDados('bolsas')">Ver Bolsas (PROEX)</button>
        </div>

        <div id="container-vagas" class="grid-vagas">
            <p class="carregando">Carregando oportunidades...</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
